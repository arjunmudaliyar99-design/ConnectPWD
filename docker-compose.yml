version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: connectpwd-postgres
    environment:
      POSTGRES_DB: connectpwd
      POSTGRES_USER: connectpwd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-connectpwd_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connectpwd"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: connectpwd-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: connectpwd
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-connectpwd_dev}
      MONGO_INITDB_DATABASE: connectpwd
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: connectpwd-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-connectpwd_dev}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-connectpwd_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: connectpwd-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/connectpwd
      SPRING_DATASOURCE_USERNAME: connectpwd
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-connectpwd_dev}
      SPRING_DATA_MONGODB_URI: mongodb://connectpwd:${MONGO_PASSWORD:-connectpwd_dev}@mongo:27017/connectpwd?authSource=admin
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-connectpwd_dev}
      JWT_SECRET: ${JWT_SECRET:-default-dev-secret-must-be-at-least-256-bits-long-for-hs256-algorithm}
      JWT_ACCESS_EXPIRY_MS: 900000
      JWT_REFRESH_EXPIRY_MS: 604800000
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-connectpwd-dev}
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      APP_ENV: dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: connectpwd-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_APP_ENV: development
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
  redis_data:
